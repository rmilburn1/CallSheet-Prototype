services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: callsheet-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - backend_logs:/app/logs

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: callsheet-frontend
    depends_on:
      - backend
    env_file:
      - ./frontend/.env
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"

volumes:
  backend_db:
  backend_logs: