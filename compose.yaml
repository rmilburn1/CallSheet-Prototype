services:
  backend:
    build:
      context: ./backend
    container_name: callsheet-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////app/app.db
    volumes:
      - ./backend/app.db:/app/app.db
      - backend_logs:/app/logs

  frontend:
    build:
      context: ./frontend
    container_name: callsheet-frontend
    depends_on:
      - backend
    env_file:
      - ./frontend/.env
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000

volumes:
  backend_logs:
